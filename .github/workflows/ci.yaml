name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - run: composer validate --strict

      - run: composer install --no-progress

      - run: vendor/bin/phpunit

      - run: ./mago format --check
        if: ${{ matrix.php == '8.4' }}

      - run: ./mago lint --minimum-fail-level error --minimum-report-level error
        if: ${{ matrix.php == '8.4' }}
