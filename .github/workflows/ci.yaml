name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  security-events: write
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - run: composer validate --strict

      - run: composer install --no-progress

      - run: vendor/bin/phpunit

      - run: ./mago format --check
        if: ${{ matrix.php == '8.4' }}

      - run: ./mago lint --minimum-fail-level error --minimum-report-level error
        if: ${{ matrix.php == '8.4' }}

      - name: Install phanalist
        run: |
          curl -sSfL https://github.com/denzyldick/phanalist/releases/latest/download/phanalist-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin
          phanalist --version
        if: ${{ matrix.php == '8.4' }}

      - name: Run phanalist (SARIF for annotations)
        run: phanalist -c phanalist.yaml -s src --output-format=sarif > phanalist-results.sarif
        if: ${{ matrix.php == '8.4' }}
        continue-on-error: true

      - uses: github/codeql-action/upload-sarif@v3
        if: ${{ matrix.php == '8.4' }}
        with:
          sarif_file: phanalist-results.sarif

      - name: Run phanalist (fails CI on issues)
        run: phanalist -c phanalist.yaml -s src
        if: ${{ matrix.php == '8.4' }}
